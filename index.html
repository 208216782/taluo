<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ 星语塔罗 · 命运之门</title>
    <style>
        /* ===== 全局样式 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(ellipse at center, #1a1a2e 0%, #0f0f1a 100%);
            font-family: 'Georgia', 'Noto Serif SC', serif;
            color: #e8e0d0;
            overflow-x: hidden;
        }

        /* 神秘背景粒子 */
        .mystical-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: #c9a0dc;
            border-radius: 50%;
            opacity: 0.4;
            animation: twinkle 3s ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.2); }
        }

        /* 法阵装饰 */
        .magic-circle {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            border: 2px solid rgba(201, 160, 220, 0.1);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        .magic-circle::before,
        .magic-circle::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            border: 1px solid rgba(201, 160, 220, 0.08);
        }

        .magic-circle::before {
            width: 80%;
            height: 80%;
        }

        .magic-circle::after {
            width: 60%;
            height: 60%;
        }

        /* ===== 容器 ===== */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 30px 20px;
            position: relative;
            z-index: 1;
        }

        /* ===== 头部导航 ===== */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .app-title {
            font-size: 42px;
            background: linear-gradient(135deg, #e8d0b0, #c9a0dc, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(201, 160, 220, 0.3);
            margin-bottom: 10px;
            letter-spacing: 8px;
        }

        .app-subtitle {
            font-size: 16px;
            color: #a09080;
            letter-spacing: 4px;
        }

        .nav-tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .nav-tab {
            padding: 14px 28px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(201, 160, 220, 0.2);
            border-radius: 30px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            color: #c0b0a0;
            letter-spacing: 2px;
        }

        .nav-tab:hover {
            background: rgba(201, 160, 220, 0.1);
            border-color: rgba(201, 160, 220, 0.4);
            transform: translateY(-3px);
        }

        .nav-tab.active {
            background: linear-gradient(135deg, rgba(201, 160, 220, 0.2), rgba(102, 126, 234, 0.2));
            border-color: #c9a0dc;
            color: #e8d0b0;
            box-shadow: 0 0 30px rgba(201, 160, 220, 0.2);
        }

        /* ===== 页面切换 ===== */
        .page {
            display: none;
        }

        .page.active {
            display: block;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== 首页模块选择 ===== */
        .mode-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }

        .mode-card {
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid rgba(201, 160, 220, 0.15);
            border-radius: 20px;
            padding: 35px 25px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center;
        }

        .mode-card:hover {
            background: rgba(201, 160, 220, 0.08);
            border-color: rgba(201, 160, 220, 0.4);
            transform: translateY(-8px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
        }

        .mode-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }

        .mode-name {
            font-size: 24px;
            color: #e8d0b0;
            margin-bottom: 10px;
            letter-spacing: 3px;
        }

        .mode-desc {
            font-size: 14px;
            color: #908880;
            line-height: 1.8;
        }

        /* ===== API配置 ===== */
        .api-config {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(201, 160, 220, 0.15);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
        }

        .api-label {
            display: block;
            font-size: 16px;
            color: #c9a0dc;
            margin-bottom: 12px;
        }

        .api-input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(201, 160, 220, 0.2);
            border-radius: 10px;
            color: #e8e0d0;
            font-size: 14px;
            font-family: monospace;
        }

        .api-input:focus {
            outline: none;
            border-color: #c9a0dc;
        }

        .api-hint {
            margin-top: 10px;
            font-size: 13px;
            color: #706860;
        }

        .api-hint a {
            color: #c9a0dc;
            text-decoration: none;
        }

        /* ===== 仪式舞台 ===== */
        .ritual-stage {
            min-height: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .stage-instruction {
            text-align: center;
            margin-bottom: 40px;
        }

        .instruction-title {
            font-size: 28px;
            color: #e8d0b0;
            margin-bottom: 15px;
            letter-spacing: 4px;
        }

        .instruction-text {
            font-size: 15px;
            color: #908880;
            line-height: 1.8;
        }

        /* 问题输入 */
        .question-section {
            width: 100%;
            max-width: 600px;
            margin-bottom: 40px;
        }

        .question-label {
            display: block;
            font-size: 16px;
            color: #c9a0dc;
            margin-bottom: 12px;
        }

        .question-textarea {
            width: 100%;
            min-height: 100px;
            padding: 18px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(201, 160, 220, 0.2);
            border-radius: 12px;
            color: #e8e0d0;
            font-size: 15px;
            resize: vertical;
            font-family: inherit;
            line-height: 1.7;
        }

        .question-textarea:focus {
            outline: none;
            border-color: #c9a0dc;
        }

        /* 分类选择 */
        .category-selector {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 30px;
        }

        .category-btn {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(201, 160, 220, 0.2);
            border-radius: 20px;
            color: #a09080;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }

        .category-btn:hover {
            background: rgba(201, 160, 220, 0.1);
        }

        .category-btn.selected {
            background: rgba(201, 160, 220, 0.15);
            border-color: #c9a0dc;
            color: #e8d0b0;
        }

        /* 召唤按钮 */
        .summon-btn {
            padding: 18px 60px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 50px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 4px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 40px rgba(102, 126, 234, 0.3);
        }

        .summon-btn:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 15px 50px rgba(102, 126, 234, 0.5);
        }

        .summon-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* ===== 卡牌展示 ===== */
        .cards-container {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            margin: 30px 0;
            perspective: 1500px;
        }

        .card-wrapper {
            perspective: 1000px;
        }

        .card {
            width: 180px;
            height: 270px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card.spinning {
            animation: cardSpin 2s linear infinite;
        }

        @keyframes cardSpin {
            from { transform: rotateY(0deg); }
            to { transform: rotateY(360deg); }
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .card-front {
            background: linear-gradient(135deg, #2c3e50, #1a1a2e);
            border: 3px solid #c9a0dc;
        }

        .card-front::before {
            content: '✧✦✧';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 50px;
            color: rgba(201, 160, 220, 0.3);
        }

        .card-back {
            background: linear-gradient(135deg, #1a1a2e, #2c3e50);
            border: 3px solid #c9a0dc;
            transform: rotateY(180deg);
        }

        .card-icon {
            font-size: 60px;
            margin-bottom: 15px;
        }

        .card-name {
            font-size: 20px;
            color: #e8d0b0;
            margin-bottom: 10px;
            text-align: center;
        }

        .card-position {
            font-size: 14px;
            padding: 6px 18px;
            border-radius: 15px;
            margin-bottom: 12px;
        }

        .card-position.upright {
            background: rgba(102, 126, 234, 0.2);
            color: #667eea;
        }

        .card-position.reversed {
            background: rgba(255, 107, 107, 0.2);
            color: #ff6b6b;
        }

        .card-meaning {
            font-size: 13px;
            color: #908880;
            text-align: center;
            line-height: 1.6;
        }

        .card-label {
            position: absolute;
            top: -35px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            color: #c9a0dc;
            white-space: nowrap;
            letter-spacing: 2px;
        }

        /* ===== 解读面板 ===== */
        .reading-panel {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(201, 160, 220, 0.15);
            border-radius: 15px;
            padding: 35px;
            margin-top: 40px;
        }

        .reading-title {
            font-size: 28px;
            color: #e8d0b0;
            text-align: center;
            margin-bottom: 30px;
            letter-spacing: 4px;
        }

        .reading-section {
            margin-bottom: 25px;
        }

        .reading-section-title {
            font-size: 18px;
            color: #c9a0dc;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .reading-section-title::before {
            content: '✦';
            color: #c9a0dc;
        }

        .reading-section-content {
            font-size: 15px;
            color: #c0b0a0;
            line-height: 1.9;
            padding-left: 25px;
        }

        .loading-ai {
            text-align: center;
            padding: 40px;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(201, 160, 220, 0.2);
            border-top-color: #c9a0dc;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: #c9a0dc;
            font-size: 16px;
        }

        /* ===== 莱诺薇对话 ===== */
        .chat-container {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(201, 160, 220, 0.15);
            border-radius: 15px;
            margin-top: 30px;
            overflow: hidden;
        }

        .chat-header {
            background: rgba(201, 160, 220, 0.1);
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid rgba(201, 160, 220, 0.1);
        }

        .chat-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .chat-name {
            font-size: 18px;
            color: #e8d0b0;
            margin-bottom: 4px;
        }

        .chat-status {
            font-size: 13px;
            color: #908880;
        }

        .chat-messages {
            max-height: 400px;
            overflow-y: auto;
            padding: 25px;
        }

        .chat-message {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .chat-message.user {
            flex-direction: row-reverse;
        }

        .chat-message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .chat-message.assistant .chat-message-avatar {
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .chat-message.user .chat-message-avatar {
            background: rgba(255, 255, 255, 0.1);
        }

        .chat-message-content {
            max-width: 75%;
            padding: 15px 20px;
            border-radius: 15px;
            line-height: 1.7;
        }

        .chat-message.assistant .chat-message-content {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(201, 160, 220, 0.1);
            color: #c0b0a0;
        }

        .chat-message.user .chat-message-content {
            background: rgba(102, 126, 234, 0.15);
            color: #e8e0d0;
        }

        .chat-input-area {
            padding: 20px;
            border-top: 1px solid rgba(201, 160, 220, 0.1);
            display: flex;
            gap: 15px;
        }

        .chat-input {
            flex: 1;
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(201, 160, 220, 0.2);
            border-radius: 25px;
            color: #e8e0d0;
            font-size: 15px;
        }

        .chat-input:focus {
            outline: none;
            border-color: #c9a0dc;
        }

        .chat-send-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .chat-send-btn:hover:not(:disabled) {
            transform: scale(1.1);
        }

        .chat-send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ===== 历史记录 ===== */
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .history-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(201, 160, 220, 0.15);
            border-radius: 15px;
            padding: 25px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .history-item:hover {
            background: rgba(201, 160, 220, 0.05);
            border-color: rgba(201, 160, 220, 0.3);
        }

        .history-date {
            font-size: 13px;
            color: #706860;
            margin-bottom: 10px;
        }

        .history-type {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(201, 160, 220, 0.15);
            border-radius: 12px;
            font-size: 12px;
            color: #c9a0dc;
            margin-bottom: 12px;
        }

        .history-question {
            font-size: 17px;
            color: #e8d0b0;
            margin-bottom: 12px;
        }

        .history-cards {
            font-size: 14px;
            color: #908880;
        }

        .empty-history {
            text-align: center;
            padding: 80px 20px;
            color: #706860;
        }

        .empty-history-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        /* ===== 操作按钮 ===== */
        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .action-btn {
            padding: 14px 35px;
            border-radius: 30px;
            font-size: 15px;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 2px;
        }

        .action-btn.secondary {
            background: rgba(255, 255, 255, 0.08);
            color: #e8e0d0;
            border: 1px solid rgba(201, 160, 220, 0.2);
        }

        .action-btn.secondary:hover {
            background: rgba(255, 255, 255, 0.12);
        }

        .action-btn.primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .action-btn.primary:hover {
            transform: scale(1.05);
        }

        /* ===== 响应式 ===== */
        @media (max-width: 768px) {
            .app-title {
                font-size: 28px;
                letter-spacing: 4px;
            }
            
            .card {
                width: 140px;
                height: 210px;
            }
            
            .card-name {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <!-- 神秘背景 -->
    <div class="mystical-bg" id="mysticalBg"></div>
    <div class="magic-circle"></div>

    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <h1 class="app-title">星语塔罗</h1>
            <p class="app-subtitle">命运之门 · 心之所向</p>
            
            <div class="nav-tabs">
                <div class="nav-tab active" onclick="App.showPage('home')">🏠 首页</div>
                <div class="nav-tab" onclick="App.showPage('history')">📜 历史记录</div>
            </div>
        </div>

        <!-- 首页 - 选择模式 -->
        <div id="page-home" class="page active">
            <!-- API配置 -->
            <div class="api-config">
                <label class="api-label">🔑 DeepSeek API Key（选填，获取更精准的AI解读）</label>
                <input type="password" class="api-input" id="apiKeyInput" placeholder="sk-...">
                <p class="api-hint">获取地址：<a href="https://platform.deepseek.com/" target="_blank">platform.deepseek.com</a></p>
            </div>

            <div class="mode-grid">
                <div class="mode-card" onclick="App.startMode('daily')">
                    <div class="mode-icon">☀️</div>
                    <div class="mode-name">每日运势</div>
                    <div class="mode-desc">单牌抽取，快速查看今日能量指引</div>
                </div>
                <div class="mode-card" onclick="App.startMode('triangle')">
                    <div class="mode-icon">🔮</div>
                    <div class="mode-name">命运三相阵</div>
                    <div class="mode-desc">三张牌联动，解读过去、现在与未来</div>
                </div>
            </div>
        </div>

        <!-- 仪式舞台 -->
        <div id="page-ritual" class="page">
            <div class="ritual-stage">
                <!-- 动态内容由JS渲染 -->
            </div>
        </div>

        <!-- 历史记录 -->
        <div id="page-history" class="page">
            <div class="history-list" id="historyList"></div>
        </div>
    </div>

    <script>
        // ==================== 塔罗牌数据模块 ====================
        const TarotData = {
            majorArcana: [
                { id: 0, name: '愚者', icon: '🃏', upright: '新的开始、冒险、天真、自由、自发性', reversed: '鲁莽、冒险失败、不负责任、愚蠢' },
                { id: 1, name: '魔术师', icon: '🎭', upright: '创造力、技能、意志力、自信、能力', reversed: '欺骗、操纵、技能不足、欺骗' },
                { id: 2, name: '女祭司', icon: '🌙', upright: '直觉、神秘、潜意识、智慧、内在知识', reversed: '压抑直觉、表面肤浅、隐藏的真相' },
                { id: 3, name: '女皇', icon: '👑', upright: '丰饶、母性、自然、感官享受、创造力', reversed: '依赖、创造力受阻、空虚、焦虑' },
                { id: 4, name: '皇帝', icon: '👨', upright: '权威、结构、控制、父亲形象、稳定', reversed: '暴政、僵化、冷酷、缺乏纪律' },

            seededRandom(seed) {

            getDailySeed() {
                const now = new Date();
                return now.getFullYear() * 10000 + (now.getMonth() + 1) * 100 + now.getDate();
            },

            shuffleCards(cards) {
                const shuffled = [...cards];
                for (let i = shuffled.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                }
                return shuffled;
            },

            shuffleCardsSeeded(cards, seed) {
                const shuffled = [...cards];
                for (let i = shuffled.length - 1; i > 0; i--) {
                    seed = seed * 9301 + 49297;
                    const j = Math.floor((seed % 233280) / 233280 * (i + 1));
                    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                }
                return shuffled;
            },

            drawCards(count, useSeed = false) {
                const allCards = TarotData.getAllCards();
                let shuffled;
                
                if (useSeed) {
                    const seed = this.getDailySeed();
                    shuffled = this.shuffleCardsSeeded(allCards, seed);
                } else {
                    shuffled = this.shuffleCards(allCards);
                }

                const drawn = [];
                for (let i = 0; i < count; i++) {
                    const card = shuffled[i];
                    let isUpright;
                    
                    if (useSeed) {
                        isUpright = this.seededRandom(this.getDailySeed() + i) > 0.5;
                    } else {
                        isUpright = Math.random() > 0.5;
                    }
                    
                    drawn.push({
                        ...card,
                        position: isUpright ? '正位' : '逆位',
                        positionEn: isUpright ? 'upright' : 'reversed',
                        meaning: isUpright ? card.upright : card.reversed
                    });
                }
                return drawn;
            }

                const apiKey = this.getApiKey();

                const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({

                        messages: [
                            { role: 'system', content: systemPrompt },
                            { role: 'user', content: userPrompt }
                        ],
                        temperature: 0.8
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error?.message || 'API调用失败');
                }

                const data = await response.json();
                return data.choices[0].message.content;

                const btn = document.querySelector('.summon-btn');
                btn.disabled = true;
                btn.textContent = '召唤中...';

                // 抽牌（带种子）
                this.currentCards = CardDrawing.drawCards(1, true);

                // 显示旋转动画
                UI.renderRitualStage(`
                    <div class="stage-instruction">
                        <div class="instruction-title">✨ 命运显现中</div>
                        <div class="instruction-text">
                            宇宙正在为你挑选今日的指引...
                        </div>
                    </div>
                    ${UI.renderCards(this.currentCards)}
                `);

                // 卡牌旋转动画
                document.querySelectorAll('.card').forEach(card => {
                    card.classList.add('spinning');
                });

                // 等待2秒后翻牌
                await this.delay(2000);
                
                document.querySelectorAll('.card').forEach(card => {
                    card.classList.remove('spinning');
                    card.classList.add('flipped');
                });

                // 显示加载并获取解读
                await this.delay(1000);
                await this.showReading('daily');
            },

            currentTriangleStep: 0,

            async startTriangleDraw() {
                const questionInput = document.getElementById('questionInput');
                this.currentQuestion = (questionInput?.value || '').trim() || this.selectedCategory || '综合指引';
                
                const btn = document.querySelector('.summon-btn');
                btn.disabled = true;
                btn.textContent = '召唤中...';

                // 一次性抽取三张牌
                this.currentCards = CardDrawing.drawCards(3, false);
                this.currentTriangleStep = 0;

                await this.showNextTriangleCard();
            },

            async showNextTriangleCard() {
                const labels = ['唤醒过往之影', '映照此刻之心', '窥见未来之门'];
                
                if (this.currentTriangleStep < 3) {
                    const cardsToShow = this.currentCards.slice(0, this.currentTriangleStep + 1);
                    
                    UI.renderRitualStage(`
                        <div class="stage-instruction">
                            <div class="instruction-title">✦ ${labels[this.currentTriangleStep]} ✦</div>
                            <div class="instruction-text">
                                ${this.currentTriangleStep < 2 ? '点击按钮揭示下一张牌' : '正在解读命运的讯息...'}
                            </div>
                        </div>
                        ${UI.renderCards(cardsToShow, labels.slice(0, this.currentTriangleStep + 1))}
                        ${this.currentTriangleStep < 2 ? `
                            <button class="summon-btn" onclick="App.revealNextCard()">揭示下一张</button>
                        ` : ''}
                    `);

                    // 翻牌动画
                    const cards = document.querySelectorAll('.card');
                    if (cards.length > 0) {
                        const lastCard = cards[cards.length - 1];
                        lastCard.classList.add('spinning');
                        
                        await this.delay(1500);
                        lastCard.classList.remove('spinning');
                        lastCard.classList.add('flipped');
                    }
                    
                    if (this.currentTriangleStep === 2) {
                        await this.delay(1000);
                        await this.showReading('triangle');
                    }
                }
            },

            async revealNextCard() {
                this.currentTriangleStep++;
                await this.showNextTriangleCard();
            },

            async showReading(type) {
                // 显示加载
                UI.renderRitualStage(`
                    <div class="stage-instruction">
                        <div class="instruction-title">✨ 解读命运</div>
                        <div class="instruction-text">
                            莱诺薇正在为你解读牌面的讯息...
                        </div>
                    </div>
                    ${UI.renderCards(this.currentCards, type === 'triangle' ? ['过去', '现在', '未来'] : [])}
                    <div class="reading-panel">
                        <div class="loading-ai">
                            <div class="loading-spinner"></div>
                            <div class="loading-text">正在连接宇宙的讯息...</div>
                        </div>
                    </div>
                `);

                // 先翻牌
                await this.delay(300);
                document.querySelectorAll('.card').forEach(card => {
                    if (!card.classList.contains('flipped')) {
                        card.classList.add('flipped');
                    }
                });

                // 尝试AI解读
                let reading = await AI.getReading(this.currentCards, type, this.currentQuestion);
                
                // 如果没有AI，使用本地解读
                if (!reading) {
                    reading = TarotData.getLocalReading(this.currentCards, type, this.currentQuestion);
                }

                this.currentReading = reading;

                // 保存记录
                this.chatContext = {
                    type: type,
                    question: this.currentQuestion,
                    cards: this.currentCards,
                    reading: reading
                };

                const saved = Storage.save({
                    type: type,
                    question: this.currentQuestion,
                    cards: this.currentCards,
                    reading: reading
                });

                // 显示结果
                UI.renderRitualStage(`
                    <div class="stage-instruction">
                        <div class="instruction-title">✦ 命运显现 ✦</div>
                    </div>
                    ${UI.renderCards(this.currentCards, type === 'triangle' ? ['过去', '现在', '未来'] : [])}
                    ${UI.renderReading(reading, type)}
                    ${UI.renderChat(this.chatContext)}
                    <div class="action-buttons">
                        <button class="action-btn secondary" onclick="App.goHome()">返回首页</button>
                        <button class="action-btn primary" onclick="App.startMode('${type}')">再来一次</button>
                    </div>
                `);

                // 翻牌
                await this.delay(300);
                document.querySelectorAll('.card').forEach(card => {
                    card.classList.add('flipped');
                });

                // 监听回车发送
                const chatInput = document.getElementById('chatInput');
                if (chatInput) {
                    chatInput.addEventListener('keypress', (e) => {
                        if (e.key === 'Enter') {
                            this.sendChat();
                        }
                    });
                }
            },

            async sendChat() {
                const input = document.getElementById('chatInput');
                const sendBtn = document.getElementById('chatSendBtn');
                const message = input.value.trim();
                
                if (!message || !this.chatContext) return;

                // 添加用户消息
                this.addChatMessage('user', message);
                input.value = '';
                sendBtn.disabled = true;

                // 获取AI回复
                const response = await AI.chat(this.chatContext, message);
                
                // 添加AI消息
                this.addChatMessage('assistant', response);
                sendBtn.disabled = false;
            },

            addChatMessage(role, content) {
                const container = document.getElementById('chatMessages');
                if (!container) return;

                const avatar = role === 'assistant' ? '🔮' : '👤';
                const messageEl = document.createElement('div');
                messageEl.className = `chat-message ${role}`;
                messageEl.innerHTML = `
                    <div class="chat-message-avatar">${avatar}</div>
                    <div class="chat-message-content">${content}</div>
                `;
                container.appendChild(messageEl);
                container.scrollTop = container.scrollHeight;
            },

            async loadHistoryItem(id) {
                const history = Storage.getAll();
                const item = history.find(h => h.id === id);
                if (!item) return;

                this.currentMode = item.type;
                this.currentCards = item.cards;
                this.currentReading = item.reading;
                this.currentQuestion = item.question;
                this.chatContext = {
                    type: item.type,
                    question: item.question,
                    cards: item.cards,
                    reading: item.reading
                };

                this.showPage('ritual');
                
                UI.renderRitualStage(`
                    <div class="stage-instruction">
                        <div class="instruction-title">✦ 历史记录 ✦</div>
                    </div>
                    ${UI.renderCards(this.currentCards, item.type === 'triangle' ? ['过去', '现在', '未来'] : [])}
                    ${UI.renderReading(this.currentReading, item.type)}
                    ${UI.renderChat(this.chatContext)}
                    <div class="action-buttons">
                        <button class="action-btn secondary" onclick="App.goHome()">返回首页</button>
                    </div>
                `);

                // 翻牌
                await this.delay(300);
                document.querySelectorAll('.card').forEach(card => {
                    card.classList.add('flipped');
                });

                // 监听回车发送
                const chatInput = document.getElementById('chatInput');
                if (chatInput) {
                    chatInput.addEventListener('keypress', (e) => {
                        if (e.key === 'Enter') {
                            this.sendChat();
                        }
                    });
                }
            },

            goHome() {
                this.currentMode = null;
                this.currentCards = null;
                this.currentReading = null;
                this.currentQuestion = '';
                this.a = '';
                this.showPage('home');
            },

            delay(ms) {
                return new Promise(resolve => setTimeout(resolve, ms));
            }
        };

        // 初始化
        App.init();
    </script>
</body>
</html>
